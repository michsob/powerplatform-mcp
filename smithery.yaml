# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['build/index.js'], env: { POWERPLATFORM_URL: config.organizationUrl, POWERPLATFORM_CLIENT_ID: config.clientId, POWERPLATFORM_CLIENT_SECRET: config.clientSecret, POWERPLATFORM_TENANT_ID: config.tenantId } })
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - organizationUrl
      - clientId
      - clientSecret
      - tenantId
    properties:
      organizationUrl:
        type: string
        description: PowerPlatform organization URL
      clientId:
        type: string
        description: Azure App Client ID
      clientSecret:
        type: string
        description: Azure App Client Secret
      tenantId:
        type: string
        description: Azure Tenant ID
  exampleConfig:
    organizationUrl: https://example.crm.dynamics.com
    clientId: 00000000-0000-0000-0000-000000000000
    clientSecret: supersecret
    tenantId: 11111111-1111-1111-1111-111111111111
